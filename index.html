<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF8C00">
    <title>Konuşuyorum & Öğreniyorum 🌈</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Çocuklar için interaktif AAC ve Eğitim uygulaması.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #FF8C00; /* Canlı Turuncu */
            --secondary: #4CAF50; /* Doğa Yeşili */
            --accent: #2196F3; /* Deniz Mavisi */
            --yellow: #FFD700; /* Güneş Sarısı */
            --bg: #F0F4F8;
            --text: #2C3E50;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 140, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(33, 150, 243, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* Header */
        .header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        .header h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.6rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-round {
            background: #F0F2F5;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 15px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-round:active { transform: scale(0.9); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-accent { background: var(--accent); color: white; }

        /* Main Container */
        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: 25px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 4px solid transparent;
            position: relative;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card:active { transform: scale(0.95); }
        
        .card.person { border-color: var(--primary); }
        .card.category { border-color: var(--accent); }
        .card.item { border-color: var(--secondary); }
        .card.quiz { border-color: var(--yellow); }

        .card-img {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            border-radius: 20px;
            background: #F8F9FA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            object-fit: cover;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }

        /* Quiz Styles */
        .quiz-container {
            background: var(--white);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .quiz-question {
            font-family: 'Baloo 2', cursive;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: #F8F9FA;
            border: 3px solid #EEE;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover { border-color: var(--accent); background: #E3F2FD; }
        .option-btn.correct { border-color: var(--secondary); background: #E8F5E9; }
        .option-btn.wrong { border-color: var(--danger); background: #FFEBEE; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .next-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }

        /* Form Styles */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #DDD;
            font-size: 1rem;
        }
        .btn-save {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--secondary);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,0,0,0.1);
            color: #FF5252;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== DATABASE ====================
        let db;
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('KonusuyorumGelismişDB', 3);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) db.createObjectStore('people', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('quizzes')) db.createObjectStore('quizzes', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }

        const crud = (storeName) => ({
            getAll: () => new Promise(r => {
                const tx = db.transaction(storeName, 'readonly');
                const req = tx.objectStore(storeName).getAll();
                req.onsuccess = () => r(req.result);
            }),
            get: (id) => new Promise(r => {
                const tx = db.transaction(storeName, 'readonly');
                const req = tx.objectStore(storeName).get(id);
                req.onsuccess = () => r(req.result);
            }),
            save: (data) => new Promise(r => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(data);
                tx.oncomplete = () => r();
            }),
            delete: (id) => new Promise(r => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(id);
                tx.oncomplete = () => r();
            })
        });

        const peopleDB = crud('people');
        const quizDB = crud('quizzes');

        // ==================== UTILS ====================
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };
        
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // ==================== RENDERER ====================
        const app = document.getElementById('app');

        async function render() {
            const hash = window.location.hash || '#/';
            app.innerHTML = '<div style="text-align:center;padding:50px">Yükleniyor... 🎈</div>';

            if (hash === '#/') {
                const people = await peopleDB.getAll();
                renderHome(people);
            } else if (hash === '#/quizzes') {
                const quizzes = await quizDB.getAll();
                renderQuizList(quizzes);
            } else if (hash.startsWith('#/quiz-play/')) {
                const id = hash.split('/')[2];
                const quizzes = await quizDB.getAll();
                const index = quizzes.findIndex(q => q.id === id);
                renderQuizPlay(quizzes, index);
            } else if (hash.startsWith('#/person/')) {
                const person = await peopleDB.get(hash.split('/')[2]);
                renderPerson(person);
            } else if (hash.startsWith('#/category/')) {
                const parts = hash.split('/');
                const person = await peopleDB.get(parts[2]);
                const category = person.categories.find(c => c.id === parts[3]);
                renderCategory(person, category);
            } else if (hash === '#/add-person') {
                renderForm('Yeni Kişi', (e) => savePerson(e), [{id:'name', label:'İsim'}, {id:'img', label:'Fotoğraf', type:'file'}]);
            } else if (hash === '#/add-quiz') {
                renderQuizForm();
            } else if (hash.startsWith('#/add-category/')) {
                const pid = hash.split('/')[2];
                renderForm('Yeni Kategori', (e) => saveCategory(e, pid), [{id:'name', label:'Kategori Adı'}]);
            } else if (hash.startsWith('#/add-item/')) {
                const parts = hash.split('/');
                renderForm('Yeni Kelime', (e) => saveItem(e, parts[2], parts[3]), [{id:'text', label:'Kelime'}, {id:'img', label:'Fotoğraf', type:'file'}]);
            }
        }

        function renderHome(people) {
            app.innerHTML = `
                <div class="header">
                    <h1>Konuşuyorum</h1>
                    <div class="nav-buttons">
                        <button class="btn-round btn-accent" onclick="navigate('#/quizzes')">🎮</button>
                        <button class="btn-round btn-primary" onclick="navigate('#/add-person')">＋</button>
                    </div>
                </div>
                <div class="container">
                    <div class="grid">
                        ${people.map(p => `
                            <div class="card person" onclick="navigate('#/person/${p.id}')">
                                <button class="btn-delete" onclick="event.stopPropagation(); deletePerson('${p.id}')">✕</button>
                                <div class="card-img">${p.avatar ? `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:15px;object-fit:cover">` : '👤'}</div>
                                <div class="card-title">${p.name}</div>
                            </div>
                        `).join('')}
                    </div>
                    ${people.length === 0 ? '<p style="text-align:center;margin-top:30px">Hadi birini ekleyerek başla! 🌟</p>' : ''}
                </div>
            `;
        }

        function renderQuizList(quizzes) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="navigate('#/')">⬅️</button>
                    <h1>Oyun Vakti</h1>
                    <button class="btn-round btn-primary" onclick="navigate('#/add-quiz')">＋</button>
                </div>
                <div class="container">
                    <div class="grid">
                        ${quizzes.map(q => `
                            <div class="card quiz" onclick="navigate('#/quiz-play/${q.id}')">
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteQuiz('${q.id}')">✕</button>
                                <div class="card-img">❓</div>
                                <div class="card-title">${q.question}</div>
                            </div>
                        `).join('')}
                    </div>
                    ${quizzes.length === 0 ? '<p style="text-align:center;margin-top:30px">Henüz soru yok, hadi bir tane ekle! 🎮</p>' : ''}
                </div>
            `;
        }

        function renderQuizPlay(quizzes, index) {
            const quiz = quizzes[index];
            if (!quiz) { navigate('#/quizzes'); return; }
            
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="navigate('#/quizzes')">⬅️</button>
                    <h1>Soru ${index + 1}</h1>
                    <div style="width:45px"></div>
                </div>
                <div class="container">
                    <div class="quiz-container">
                        <div class="quiz-question">${quiz.question}</div>
                        <div class="options-grid">
                            ${quiz.options.map((opt, i) => `
                                <button class="option-btn" onclick="checkAnswer(this, ${i === quiz.correct}, '${quiz.id}')">${opt}</button>
                            `).join('')}
                        </div>
                        <button class="next-btn" onclick="navigate('#/quiz-play/${quizzes[index+1]?.id || quizzes[0].id}')">Sıradaki Soru ➡️</button>
                    </div>
                </div>
            `;
        }

        window.checkAnswer = (btn, isCorrect, quizId) => {
            if (isCorrect) {
                btn.classList.add('correct');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                speak("Harika! Doğru cevap!");
            } else {
                btn.classList.add('wrong');
                speak("Tekrar dene!");
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        };

        function renderPerson(person) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="navigate('#/')">⬅️</button>
                    <h1>${person.name}</h1>
                    <button class="btn-round btn-primary" onclick="navigate('#/add-category/${person.id}')">＋</button>
                </div>
                <div class="container">
                    <div class="grid">
                        ${(person.categories || []).map(c => `
                            <div class="card category" onclick="navigate('#/category/${person.id}/${c.id}')">
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteCategory('${person.id}', '${c.id}')">✕</button>
                                <div class="card-img">📁</div>
                                <div class="card-title">${c.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderCategory(person, category) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="navigate('#/person/${person.id}')">⬅️</button>
                    <h1>${category.name}</h1>
                    <button class="btn-round btn-primary" onclick="navigate('#/add-item/${person.id}/${category.id}')">＋</button>
                </div>
                <div class="container">
                    <div class="grid">
                        ${(category.items || []).map(i => `
                            <div class="card item" onclick="speak('${i.text}')">
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteItem('${person.id}', '${category.id}', '${i.id}')">✕</button>
                                <div class="card-img">${i.image ? `<img src="${i.image}" style="width:100%;height:100%;border-radius:15px;object-fit:cover">` : '💬'}</div>
                                <div class="card-title">${i.text}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderQuizForm() {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="navigate('#/quizzes')">⬅️</button>
                    <h1>Yeni Soru</h1>
                    <div style="width:45px"></div>
                </div>
                <div class="container">
                    <form onsubmit="saveQuiz(event)" class="quiz-container">
                        <div class="form-group">
                            <label>Soru Nedir?</label>
                            <input type="text" id="qText" required placeholder="Örn: Hangisi elmadır?">
                        </div>
                        <div class="form-group"><label>Seçenek 1</label><input type="text" id="opt0" required></div>
                        <div class="form-group"><label>Seçenek 2</label><input type="text" id="opt1" required></div>
                        <div class="form-group"><label>Seçenek 3</label><input type="text" id="opt2" required></div>
                        <div class="form-group"><label>Seçenek 4</label><input type="text" id="opt3" required></div>
                        <div class="form-group">
                            <label>Doğru Cevap Hangisi?</label>
                            <select id="correctIdx">
                                <option value="0">Seçenek 1</option>
                                <option value="1">Seçenek 2</option>
                                <option value="2">Seçenek 3</option>
                                <option value="3">Seçenek 4</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-save">Kaydet 🎮</button>
                    </form>
                </div>
            `;
        }

        function renderForm(title, onsubmit, fields) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-round" onclick="window.history.back()">⬅️</button>
                    <h1>${title}</h1>
                    <div style="width:45px"></div>
                </div>
                <div class="container">
                    <form onsubmit="event.preventDefault(); ${onsubmit.name}(event)" style="background:white;padding:25px;border-radius:25px">
                        ${fields.map(f => `
                            <div class="form-group">
                                <label>${f.label}</label>
                                <input type="${f.type || 'text'}" id="${f.id}" ${f.type !== 'file' ? 'required' : ''}>
                            </div>
                        `).join('')}
                        <button type="submit" class="btn-save">Kaydet ✨</button>
                    </form>
                </div>
            `;
            window[onsubmit.name] = onsubmit;
        }

        // ==================== HANDLERS ====================
        async function savePerson(e) {
            const name = document.getElementById('name').value;
            const file = document.getElementById('img').files[0];
            const person = { id: generateId(), name, avatar: null, categories: [] };
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    person.avatar = ev.target.result;
                    await peopleDB.save(person);
                    navigate('#/');
                };
                reader.readAsDataURL(file);
            } else {
                await peopleDB.save(person);
                navigate('#/');
            }
        }

        async function saveCategory(e, pid) {
            const name = document.getElementById('name').value;
            const person = await peopleDB.get(pid);
            person.categories.push({ id: generateId(), name, items: [] });
            await peopleDB.save(person);
            navigate('#/person/' + pid);
        }

        async function saveItem(e, pid, cid) {
            const text = document.getElementById('text').value;
            const file = document.getElementById('img').files[0];
            const person = await peopleDB.get(pid);
            const cat = person.categories.find(c => c.id === cid);
            const item = { id: generateId(), text, image: null };
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    item.image = ev.target.result;
                    cat.items.push(item);
                    await peopleDB.save(person);
                    navigate('#/category/' + pid + '/' + cid);
                };
                reader.readAsDataURL(file);
            } else {
                cat.items.push(item);
                await peopleDB.save(person);
                navigate('#/category/' + pid + '/' + cid);
            }
        }

        async function saveQuiz(e) {
            e.preventDefault();
            const quiz = {
                id: generateId(),
                question: document.getElementById('qText').value,
                options: [
                    document.getElementById('opt0').value,
                    document.getElementById('opt1').value,
                    document.getElementById('opt2').value,
                    document.getElementById('opt3').value
                ],
                correct: parseInt(document.getElementById('correctIdx').value)
            };
            await quizDB.save(quiz);
            navigate('#/quizzes');
        }

        window.deletePerson = async (id) => { if(confirm('Silinsin mi?')) { await peopleDB.delete(id); render(); } };
        window.deleteQuiz = async (id) => { if(confirm('Soru silinsin mi?')) { await quizDB.delete(id); render(); } };
        window.deleteCategory = async (pid, cid) => {
            if(confirm('Kategori silinsin mi?')) {
                const p = await peopleDB.get(pid);
                p.categories = p.categories.filter(c => c.id !== cid);
                await peopleDB.save(p);
                render();
            }
        };
        window.deleteItem = async (pid, cid, iid) => {
            if(confirm('Kelime silinsin mi?')) {
                const p = await peopleDB.get(pid);
                const c = p.categories.find(cat => cat.id === cid);
                c.items = c.items.filter(i => i.id !== iid);
                await peopleDB.save(p);
                render();
            }
        };

        window.addEventListener('hashchange', render);
        window.addEventListener('load', async () => {
            await initDB();
            render();
        });
    </script>
</body>
</html>
