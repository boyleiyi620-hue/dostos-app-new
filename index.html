<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFB300">
    <title>Konuşuyorum & Öğreniyorum 🌈</title>

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #FFB300;
            --secondary: #00D2D3;
            --accent: #FF6B6B;
            --blue: #54A0FF;
            --green: #1DD1A1;
            --bg: #FFF9E6;
            --text: #4834D4;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Fredoka', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: url("https://www.transparenttextures.com/patterns/pinstriped-suit.png");
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .header {
            background: var(--primary);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: white; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); font-weight: 800; }
        .nav-buttons { display: flex; gap: 10px; }

        .btn-round {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 18px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .btn-round:active { transform: translateY(4px); box-shadow: none; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-secondary { background: var(--green); color: white; }
        .btn-quiz { background: #FF9F43; color: white; }

        .container { padding: 20px; max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .card {
            background: var(--white);
            border-radius: 30px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 5px solid #F0F2F5;
            position: relative;
        }
        .card:active { transform: translateY(5px); box-shadow: none; }
        .card.person { border-color: var(--blue); }
        .card.category { border-color: var(--secondary); }
        .card.item { border-color: var(--green); }
        .card.quiz { border-color: #FF9F43; }

        .card-img {
            width: 90px;
            height: 90px;
            margin: 0 auto 10px;
            border-radius: 25px;
            background: #F8F9FA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            object-fit: cover;
            border: 3px solid #EEE;
        }
        .card-title { font-weight: 800; font-size: 1.1rem; color: var(--text); font-family: 'Baloo 2', cursive; }

        .action-btns { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
        .btn-mini { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 rgba(0,0,0,0.1); font-size: 0.8rem; }
        .btn-mini:active { transform: translateY(2px); box-shadow: none; }
        .btn-del { background: var(--accent); color: white; }
        .btn-edit { background: var(--blue); color: white; }

        .quiz-container { background: var(--white); border-radius: 35px; padding: 25px 15px; text-align: center; border: 8px solid var(--primary); }
        .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.8rem; margin-bottom: 20px; color: var(--text); font-weight: 800; }
        .quiz-img { width: 100%; max-width: 250px; height: 180px; border-radius: 25px; object-fit: cover; margin-bottom: 20px; border: 4px solid #F0F2F5; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .option-btn { background: #F8F9FA; border: 4px solid #EEE; padding: 15px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-family: 'Baloo 2', cursive; box-shadow: 0 5px 0 #DDD; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }
        .option-img { width: 100%; height: 100px; border-radius: 15px; object-fit: cover; border: 2px solid #EEE; }
        .option-text { font-size: 1.2rem; font-weight: 800; }
        .option-btn.correct { border-color: var(--green); background: #E6FFFA; box-shadow: 0 5px 0 #1DD1A1; }
        .option-btn.wrong { border-color: var(--accent); background: #FFF5F5; box-shadow: 0 5px 0 #FF6B6B; animation: shake 0.4s; }

        .next-btn { background: var(--blue); color: white; border: none; padding: 15px 35px; border-radius: 20px; font-size: 1.2rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #2E86DE; font-family: 'Baloo 2', cursive; }

        .form-card { background: var(--white); padding: 20px; border-radius: 30px; border: 6px solid var(--blue); }
        .form-group { margin-bottom: 12px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 800; font-size: 1rem; color: var(--text); font-family: 'Baloo 2', cursive; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 15px; border: 3px solid #F0F2F5; font-size: 1rem; background: #F8F9FA; }
        input[type="file"] { width: 100%; padding: 8px; border: 2px dashed var(--blue); border-radius: 12px; }

        .btn-save { width: 100%; padding: 15px; border-radius: 18px; border: none; background: var(--green); color: white; font-weight: 800; font-size: 1.3rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 0 #10AC84; font-family: 'Baloo 2', cursive; }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        let db;
        const DB_NAME = 'KonusuyorumFinalDB_V3';
        const DB_VERSION = 1;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) db.createObjectStore('people', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }

        const peopleDB = {
            getAll: () => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').getAll();
                req.onsuccess = () => r(req.result || []);
            }),
            get: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').get(id);
                req.onsuccess = () => r(req.result);
            }),
            save: (data) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').put(data);
                tx.oncomplete = () => r();
            }),
            delete: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').delete(id);
                tx.oncomplete = () => r();
            })
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };
        
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.85;
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        const app = document.getElementById('app');

        async function render() {
            const hash = window.location.hash || '#/';
            app.innerHTML = '<div style="text-align:center;padding:100px;font-size:3rem">🌈</div>';

            try {
                if (hash === '#/') {
                    const people = await peopleDB.getAll();
                    renderHome(people);
                } else if (hash.startsWith('#/person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPerson(person);
                } else if (hash.startsWith('#/category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const category = person.categories.find(c => c.id === parts[3]);
                    renderCategory(person, category);
                } else if (hash.startsWith('#/quiz-list/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderQuizList(person);
                } else if (hash.startsWith('#/quiz-play/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const index = person.quizzes.findIndex(q => q.id === parts[3]);
                    renderQuizPlay(person, index);
                } else if (hash === '#/add-person') {
                    renderPersonForm();
                } else if (hash.startsWith('#/edit-person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPersonForm(person);
                } else if (hash.startsWith('#/add-category/')) {
                    renderCategoryForm(hash.split('/')[2]);
                } else if (hash.startsWith('#/edit-category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    renderCategoryForm(person.id, cat);
                } else if (hash.startsWith('#/add-item/')) {
                    const parts = hash.split('/');
                    renderItemForm(parts[2], parts[3]);
                } else if (hash.startsWith('#/edit-item/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    const item = cat.items.find(i => i.id === parts[4]);
                    renderItemForm(person.id, cat.id, item);
                } else if (hash.startsWith('#/add-quiz/')) {
                    renderQuizForm(hash.split('/')[2]);
                }
            } catch (err) {
                console.error(err);
                app.innerHTML = '<p style="padding:20px">Hata oluştu 🛠️</p>';
            }
        }

        function renderHome(people) {
            app.innerHTML = `
                <div class="header"><h1>Konuşuyorum</h1><button class="btn-round btn-secondary" onclick="navigate('#/add-person')">＋</button></div>
                <div class="container"><div class="grid">${people.map(p => `
                    <div class="card person" onclick="navigate('#/person/${p.id}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deletePerson('${p.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-person/${p.id}')">✎</button>
                        </div>
                        <div class="card-img">${p.avatar ? `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:25px;object-fit:cover">` : '👤'}</div>
                        <div class="card-title">${p.name}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderPersonForm(editData = null) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/')">⬅️</button><h1>${editData ? 'Düzenle' : 'Yeni Kişi'}</h1><div style="width:45px"></div></div>
                <div class="container"><div class="form-card"><form onsubmit="handleSavePerson(event, ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>İsim</label><input type="text" id="pName" required value="${editData ? editData.name : ''}"></div>
                    <div class="form-group"><label>Fotoğraf</label><input type="file" id="pImg" accept="image/*"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSavePerson(e, id) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const file = document.getElementById('pImg').files[0];
            let person = id ? await peopleDB.get(id) : { id: generateId(), name, avatar: null, categories: [], quizzes: [] };
            person.name = name;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { person.avatar = ev.target.result; await peopleDB.save(person); navigate('#/'); };
                reader.readAsDataURL(file);
            } else { await peopleDB.save(person); navigate('#/'); }
        }

        function renderPerson(person) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/')">⬅️</button><h1>${person.name}</h1>
                    <div class="nav-buttons">
                        <button class="btn-round btn-quiz" onclick="navigate('#/quiz-list/${person.id}')">🎮</button>
                        <button class="btn-round btn-secondary" onclick="navigate('#/add-category/${person.id}')">＋</button>
                    </div>
                </div>
                <div class="container"><div class="grid">${(person.categories || []).map(c => `
                    <div class="card category" onclick="navigate('#/category/${person.id}/${c.id}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteCategory('${person.id}', '${c.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-category/${person.id}/${c.id}')">✎</button>
                        </div>
                        <div class="card-img">📁</div><div class="card-title">${c.name}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderCategoryForm(pid, editData = null) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/person/${pid}')">⬅️</button><h1>${editData ? 'Düzenle' : 'Yeni Kategori'}</h1><div style="width:45px"></div></div>
                <div class="container"><div class="form-card"><form onsubmit="handleSaveCategory(event, '${pid}', ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>Kategori Adı</label><input type="text" id="cName" required value="${editData ? editData.name : ''}"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSaveCategory(e, pid, cid) {
            e.preventDefault();
            const name = document.getElementById('cName').value;
            const person = await peopleDB.get(pid);
            if (cid) { person.categories.find(c => c.id === cid).name = name; } 
            else { person.categories.push({ id: generateId(), name, items: [] }); }
            await peopleDB.save(person);
            navigate('#/person/' + pid);
        }

        function renderCategory(person, category) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/person/${person.id}')">⬅️</button><h1>${category.name}</h1><button class="btn-round btn-secondary" onclick="navigate('#/add-item/${person.id}/${category.id}')">＋</button></div>
                <div class="container"><div class="grid">${(category.items || []).map(i => `
                    <div class="card item" onclick="speak('${i.text}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteItem('${person.id}', '${category.id}', '${i.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-item/${person.id}/${category.id}/${i.id}')">✎</button>
                        </div>
                        <div class="card-img">${i.image ? `<img src="${i.image}" style="width:100%;height:100%;border-radius:25px;object-fit:cover">` : '💬'}</div>
                        <div class="card-title">${i.text}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderItemForm(pid, cid, editData = null) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/category/${pid}/${cid}')">⬅️</button><h1>${editData ? 'Düzenle' : 'Yeni Kelime'}</h1><div style="width:45px"></div></div>
                <div class="container"><div class="form-card"><form onsubmit="handleSaveItem(event, '${pid}', '${cid}', ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>Kelime</label><input type="text" id="iText" required value="${editData ? editData.text : ''}"></div>
                    <div class="form-group"><label>Fotoğraf</label><input type="file" id="iImg" accept="image/*"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSaveItem(e, pid, cid, iid) {
            e.preventDefault();
            const text = document.getElementById('iText').value;
            const file = document.getElementById('iImg').files[0];
            const person = await peopleDB.get(pid);
            const cat = person.categories.find(c => c.id === cid);
            let item = iid ? cat.items.find(i => i.id === iid) : { id: generateId(), text, image: null };
            item.text = text;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { item.image = ev.target.result; if(!iid) cat.items.push(item); await peopleDB.save(person); navigate('#/category/'+pid+'/'+cid); };
                reader.readAsDataURL(file);
            } else { if(!iid) cat.items.push(item); await peopleDB.save(person); navigate('#/category/'+pid+'/'+cid); }
        }

        function renderQuizList(person) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/person/${person.id}')">⬅️</button><h1>${person.name} Oyunları</h1><button class="btn-round btn-secondary" onclick="navigate('#/add-quiz/${person.id}')">＋</button></div>
                <div class="container"><div class="grid">${(person.quizzes || []).map(q => `
                    <div class="card quiz" onclick="navigate('#/quiz-play/${person.id}/${q.id}')">
                        <button class="btn-mini btn-del" style="position:absolute;top:8px;right:8px" onclick="event.stopPropagation(); deleteQuiz('${person.id}', '${q.id}')">✕</button>
                        <div class="card-img">${q.image ? `<img src="${q.image}" style="width:100%;height:100%;border-radius:25px;object-fit:cover">` : '❓'}</div>
                        <div class="card-title">${q.question}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderQuizPlay(person, index) {
            const quiz = person.quizzes[index];
            if (!quiz) { navigate('#/quiz-list/' + person.id); return; }
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/quiz-list/${person.id}')">⬅️</button><h1>Soru ${index + 1}</h1><div style="width:45px"></div></div>
                <div class="container"><div class="quiz-container">
                    ${quiz.image ? `<img src="${quiz.image}" class="quiz-img">` : ''}
                    <div class="quiz-question">${quiz.question}</div>
                    <div class="options-grid">${quiz.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(this, ${i === quiz.correct})">
                            ${opt.img ? `<img src="${opt.img}" class="option-img">` : ''}
                            <span class="option-text">${opt.text}</span>
                        </button>`).join('')}</div>
                    <button class="next-btn" onclick="navigate('#/quiz-play/${person.id}/${person.quizzes[index+1]?.id || person.quizzes[0].id}')">Sıradaki ➡️</button>
                </div></div>`;
        }

        window.checkAnswer = (btn, isCorrect) => {
            if (isCorrect) { btn.classList.add('correct'); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); speak("Harika! Doğru!"); } 
            else { btn.classList.add('wrong'); speak("Tekrar dene!"); setTimeout(() => btn.classList.remove('wrong'), 500); }
        };

        function renderQuizForm(pid) {
            app.innerHTML = `
                <div class="header"><button class="btn-round" onclick="navigate('#/quiz-list/${pid}')">⬅️</button><h1>Yeni Soru</h1><div style="width:45px"></div></div>
                <div class="container"><div class="form-card"><form onsubmit="handleSaveQuiz(event, '${pid}')">
                    <div class="form-group"><label>Soru</label><input type="text" id="qText" required></div>
                    <div class="form-group"><label>Soru Fotoğrafı</label><input type="file" id="qImg" accept="image/*"></div>
                    ${[0,1,2,3].map(i => `
                        <div style="background:#F8F9FA;padding:10px;border-radius:15px;margin-bottom:10px">
                            <label>Seçenek ${i+1}</label>
                            <input type="text" id="optT${i}" required placeholder="Metin">
                            <input type="file" id="optI${i}" accept="image/*" style="margin-top:5px">
                        </div>`).join('')}
                    <div class="form-group"><label>Doğru Cevap</label><select id="correctIdx"><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option></select></div>
                    <button type="submit" class="btn-save">Kaydet 🎮</button></form></div></div>`;
        }

        async function handleSaveQuiz(e, pid) {
            e.preventDefault();
            const person = await peopleDB.get(pid);
            const quiz = { id: generateId(), question: document.getElementById('qText').value, image: null, options: [], correct: parseInt(document.getElementById('correctIdx').value) };
            
            const readFile = (file) => new Promise(r => { if(!file) r(null); const rd = new FileReader(); rd.onload = (ev) => r(ev.target.result); rd.readAsDataURL(file); });
            
            quiz.image = await readFile(document.getElementById('qImg').files[0]);
            for(let i=0; i<4; i++) {
                quiz.options.push({ text: document.getElementById('optT'+i).value, img: await readFile(document.getElementById('optI'+i).files[0]) });
            }
            
            if(!person.quizzes) person.quizzes = [];
            person.quizzes.push(quiz);
            await peopleDB.save(person);
            navigate('#/quiz-list/' + pid);
        }

        window.deletePerson = async (id) => { if(confirm('Silinsin mi?')) { await peopleDB.delete(id); render(); } };
        window.deleteQuiz = async (pid, qid) => { if(confirm('Soru silinsin mi?')) { const p = await peopleDB.get(pid); p.quizzes = p.quizzes.filter(q => q.id !== qid); await peopleDB.save(p); render(); } };
        window.deleteCategory = async (pid, cid) => { if(confirm('Silinsin mi?')) { const p = await peopleDB.get(pid); p.categories = p.categories.filter(c => c.id !== cid); await peopleDB.save(p); render(); } };
        window.deleteItem = async (pid, cid, iid) => { if(confirm('Silinsin mi?')) { const p = await peopleDB.get(pid); const c = p.categories.find(cat => cat.id === cid); c.items = c.items.filter(i => i.id !== iid); await peopleDB.save(p); render(); } };

        window.addEventListener('hashchange', render);
        window.addEventListener('load', async () => { await initDB(); render(); });
    </script>
